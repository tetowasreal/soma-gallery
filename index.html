<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광주소마고 갤러리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f4f4f4;color:#222;font-size:14px}
a{text-decoration:none;color:inherit}
.wrap{max-width:900px;margin:0 auto;padding:14px 10px}

.header{background:#1a5fb4;padding:12px 18px;margin-bottom:10px;border-radius:8px;display:flex;align-items:center;gap:10px}
.header-logo{font-size:20px;font-weight:700;color:#fff}
.header-sub{font-size:12px;color:#aecff5}

.tab-bar{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#555}
.tab.active{background:#1a5fb4;color:#fff;border-color:#1a5fb4}

.board-top{display:flex;justify-content:flex-end;margin-bottom:6px}
.btn{padding:7px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#222}
.btn-primary{background:#1a5fb4;color:#fff;border-color:#1a5fb4}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.5;cursor:not-allowed}

.board-header{display:grid;grid-template-columns:44px 1fr 90px 70px 50px;background:#dbe9fa;border:1px solid #b5cfed;border-bottom:none;border-radius:6px 6px 0 0;padding:7px 12px;font-size:12px;color:#1a5fb4;font-weight:700}
.post-list{background:#fff;border:1px solid #b5cfed;border-radius:0 0 6px 6px;margin-bottom:10px;min-height:60px}
.post-row{display:grid;grid-template-columns:44px 1fr 90px 70px 50px;padding:8px 12px;border-bottom:1px solid #eee;cursor:pointer;align-items:center}
.post-row:hover{background:#f0f6ff}
.post-row:last-child{border-bottom:none}
.post-num{color:#999;font-size:12px;text-align:center}
.post-title-cell{display:flex;align-items:center;gap:5px;overflow:hidden}
.post-title{color:#222;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-title:hover{color:#1a5fb4}
.cmt-cnt{color:#c0392b;font-size:12px;font-weight:700;flex-shrink:0}
.post-author{color:#666;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.post-date{color:#999;font-size:12px}
.post-view{color:#999;font-size:12px;text-align:center}
.badge{font-size:11px;padding:1px 6px;border-radius:4px;flex-shrink:0}
.badge-notice{background:#dbe9fa;color:#1a5fb4;border:1px solid #b5cfed}
.badge-hot{background:#fde8e8;color:#c0392b;border:1px solid #f5c0c0}
.badge-tag{background:#f0f0f0;color:#555;border:1px solid #ddd}
.empty{color:#aaa;text-align:center;padding:30px;font-size:13px}
.loading{color:#aaa;text-align:center;padding:30px;font-size:13px}

/* 글보기 */
.pv-wrap{display:none}
.pv-wrap.show{display:block}
.board-list-wrap.hidden{display:none}
.back-btn{font-size:13px;color:#1a5fb4;cursor:pointer;margin-bottom:8px;background:none;border:none;display:inline-flex;align-items:center;gap:4px;padding:0}
.pv-head{background:#fff;border:1px solid #b5cfed;border-radius:8px 8px 0 0;padding:14px 18px}
.pv-title{font-size:17px;font-weight:700;margin-bottom:8px}
.pv-meta{display:flex;gap:12px;font-size:12px;color:#888;flex-wrap:wrap}
.pv-body{background:#fff;border:1px solid #b5cfed;border-top:none;padding:18px;min-height:120px;font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-all}
.pv-react{background:#fff;border:1px solid #b5cfed;border-top:none;padding:12px 18px;display:flex;gap:10px}
.react-btn{padding:6px 18px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #ccc;background:#f8f8f8;color:#333;display:flex;align-items:center;gap:5px}
.react-btn.up{border-color:#1a5fb4;color:#1a5fb4}
.react-btn.down{border-color:#c0392b;color:#c0392b}

/* 댓글 */
.cmt-section{background:#fff;border:1px solid #b5cfed;border-top:none;border-radius:0 0 8px 8px;margin-bottom:12px}
.cmt-header{padding:10px 18px;border-bottom:1px solid #eee;font-size:13px;font-weight:700}
.cmt-item{padding:10px 18px;border-bottom:1px solid #f0f0f0}
.cmt-item:last-child{border-bottom:none}
.cmt-meta{display:flex;gap:8px;font-size:12px;color:#888;margin-bottom:4px;align-items:center}
.cmt-nick-tag{background:#dbe9fa;color:#1a5fb4;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700}
.cmt-text{font-size:13px;line-height:1.6;color:#333;word-break:break-all}
.cmt-form{padding:12px 18px;border-top:1px solid #eee;display:flex;flex-direction:column;gap:8px}
.cmt-inputs{display:flex;gap:6px;flex-wrap:wrap}
.cmt-inputs input{padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff;font-family:inherit}
.cmt-row{display:flex;gap:6px;align-items:flex-end}
.cmt-row textarea{flex:1;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;resize:none;height:64px;font-family:inherit}

/* 글쓰기 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-start;justify-content:center;padding:40px 10px;overflow-y:auto}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:10px;border:1px solid #ccc;width:100%;max-width:680px}
.modal-head{padding:14px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:15px;font-weight:700}
.modal-close{cursor:pointer;font-size:22px;color:#888;background:none;border:none;line-height:1}
.modal-body{padding:16px 18px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:700}
.form-row input,.form-row textarea,.form-row select{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff;font-family:inherit}
.form-row textarea{resize:vertical;min-height:140px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:8px}

.pagination{display:flex;gap:4px;justify-content:center;margin-top:8px}
.page-btn{padding:5px 11px;border-radius:5px;font-size:13px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#333}
.page-btn.active{background:#1a5fb4;color:#fff;border-color:#1a5fb4}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="header-logo">🏫 광주소마고 갤러리</div>
      <div class="header-sub">우리 학교 전용 익명 게시판</div>
    </div>
  </div>

  <div class="tab-bar" id="tabBar">
    <div class="tab active" onclick="switchTab(this,'전체')">전체</div>
    <div class="tab" onclick="switchTab(this,'질문')">질문</div>
    <div class="tab" onclick="switchTab(this,'유머')">유머</div>
    <div class="tab" onclick="switchTab(this,'공부')">공부</div>
    <div class="tab" onclick="switchTab(this,'급식')">급식</div>
    <div class="tab" onclick="switchTab(this,'정보')">정보</div>
  </div>

  <div class="board-list-wrap" id="boardListWrap">
    <div class="board-top">
      <button class="btn btn-primary" onclick="openWrite()">✏️ 글쓰기</button>
    </div>
    <div class="board-header">
      <span>번호</span><span>제목</span><span>글쓴이</span><span>날짜</span><span>조회</span>
    </div>
    <div class="post-list" id="postList"><div class="loading">불러오는 중...</div></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div class="pv-wrap" id="pvWrap">
    <button class="back-btn" onclick="goBack()">◀ 목록으로</button>
    <div class="pv-head">
      <div class="pv-title" id="pvTitle"></div>
      <div class="pv-meta">
        <span id="pvAuthor"></span>
        <span id="pvDate"></span>
        <span>조회 <b id="pvView"></b></span>
      </div>
    </div>
    <div class="pv-body" id="pvBody"></div>
    <div class="pv-react">
      <button class="react-btn up" id="upBtn" onclick="react('up')">👍 추천 <span id="upCnt">0</span></button>
      <button class="react-btn down" id="downBtn" onclick="react('down')">👎 비추 <span id="downCnt">0</span></button>
    </div>
    <div class="cmt-section">
      <div class="cmt-header">댓글 <span id="cmtCount">0</span>개</div>
      <div id="commentList"></div>
      <div class="cmt-form">
        <div class="cmt-inputs">
          <input type="text" id="cmtNick" placeholder="닉네임 (미입력 시 익명)" maxlength="12" style="width:150px">
          <input type="password" id="cmtPw" placeholder="비밀번호" maxlength="12" style="width:120px">
        </div>
        <div class="cmt-row">
          <textarea id="cmtText" placeholder="댓글을 입력하세요..."></textarea>
          <button class="btn btn-primary" id="cmtBtn" onclick="submitComment()">등록</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="writeModal">
  <div class="modal">
    <div class="modal-head">
      <h2>글쓰기</h2>
      <button class="modal-close" onclick="closeWrite()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>말머리</label>
        <select id="wTag">
          <option value="">말머리 없음</option>
          <option>질문</option>
          <option>유머</option>
          <option>공부</option>
          <option>급식</option>
          <option>정보</option>
          <option>공지</option>
        </select>
      </div>
      <div class="form-row">
        <label>닉네임 (미입력 시 익명)</label>
        <input type="text" id="wNick" placeholder="닉네임" maxlength="15">
      </div>
      <div class="form-row">
        <label>비밀번호 (나중에 삭제할 때 필요해요)</label>
        <input type="password" id="wPw" placeholder="비밀번호" maxlength="15">
      </div>
      <div class="form-row">
        <label>제목</label>
        <input type="text" id="wTitle" placeholder="제목을 입력하세요" maxlength="80">
      </div>
      <div class="form-row">
        <label>내용</label>
        <textarea id="wBody" placeholder="내용을 입력하세요"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="closeWrite()">취소</button>
        <button class="btn btn-primary" id="submitBtn" onclick="submitPost()">등록</button>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://oezmlycjgdyspcwgutbv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lem1seWNqZ2R5c3Bjd2d1dGJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjY3NDAsImV4cCI6MjA5Nzk0Mjc0MH0._MSyNQRcLls_px1haQhmBFAHAEiKwJppHIMjN-Bk0YY';
const PAGE_SIZE = 20;

let currentTab = '전체';
let currentPage = 1;
let currentPost = null;
let totalCount = 0;

const ANON = ['익명','고양이','강아지','라면','피자','치킨','아이스크림','참새','수달','도토리'];
function randAnon(){return ANON[Math.floor(Math.random()*ANON.length)]+(Math.floor(Math.random()*99)+1);}

function fmtDate(iso){
  const d=new Date(iso);
  const now=new Date();
  const diff=(now-d)/1000;
  if(diff<60) return '방금';
  if(diff<3600) return Math.floor(diff/60)+'분 전';
  if(diff<86400) return Math.floor(diff/3600)+'시간 전';
  return `${d.getMonth()+1}.${String(d.getDate()).padStart(2,'0')}`;
}

async function api(path, opts={}){
  const res = await fetch(SUPABASE_URL+'/rest/v1/'+path, {
    headers:{
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer '+SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer||'',
      ...opts.headers
    },
    method: opts.method||'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if(opts.method==='POST'||opts.method==='PATCH') return res;
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadPosts(){
  document.getElementById('postList').innerHTML='<div class="loading">불러오는 중...</div>';
  const filter = currentTab==='전체' ? '' : `&tag=eq.${encodeURIComponent(currentTab)}`;
  const from=(currentPage-1)*PAGE_SIZE, to=from+PAGE_SIZE-1;

  try {
    const notices = await api(`posts?select=*&is_notice=eq.true${filter}&order=created_at.desc`);
    const posts = await api(`posts?select=*&is_notice=eq.false${filter}&order=created_at.desc&limit=${PAGE_SIZE}&offset=${from}`);
    const comments = await api('comments?select=post_id&limit=1000');

    const safeNotices = Array.isArray(notices) ? notices : [];
    const safePosts = Array.isArray(posts) ? posts : [];
    const safeComments = Array.isArray(comments) ? comments : [];

    totalCount = safePosts.length + (currentPage > 1 ? from : 0);

    const cmtMap={};
    safeComments.forEach(c=>{cmtMap[c.post_id]=(cmtMap[c.post_id]||0)+1;});

    const allPosts = currentPage===1 ? [...safeNotices,...safePosts] : safePosts;

    if(!allPosts.length){
      document.getElementById('postList').innerHTML='<div class="empty">등록된 글이 없어요</div>';
      renderPagination();
      return;
    }

    let idx = from + safePosts.length;
    document.getElementById('postList').innerHTML = allPosts.map((p,i)=>{
      const isNotice = p.is_notice;
      const num = isNotice ? '<span class="badge badge-notice">공지</span>' : (idx - (i - (currentPage===1 ? safeNotices.length : 0)));
      const hot = p.up_count>=10 ? '<span class="badge badge-hot">HOT</span>' : '';
      const tag = p.tag ? `<span class="badge badge-tag">${p.tag}</span>` : '';
      const cmt = cmtMap[p.id] ? `<span class="cmt-cnt">[${cmtMap[p.id]}]</span>` : '';
      return `<div class="post-row" onclick="openPost(${p.id})">
        <span class="post-num">${num}</span>
        <span class="post-title-cell">${hot}${tag}<span class="post-title">${escHtml(p.title)}</span>${cmt}</span>
        <span class="post-author">${escHtml(p.author)}</span>
        <span class="post-date">${fmtDate(p.created_at)}</span>
        <span class="post-view">${p.view_count}</span>
      </div>`;
    }).join('');

    renderPagination();
  } catch(e) {
    console.error('loadPosts error:', e);
    document.getElementById('postList').innerHTML='<div class="empty">불러오기 실패. 새로고침 해주세요.</div>';
  }
}

function renderPagination(){
  const total=Math.ceil(totalCount/PAGE_SIZE);
  if(total<=1){document.getElementById('pagination').innerHTML='';return;}
  let html='';
  for(let i=1;i<=total;i++){
    html+=`<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  document.getElementById('pagination').innerHTML=html;
}

function goPage(n){currentPage=n;loadPosts();}

function switchTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentTab=tab;
  currentPage=1;
  loadPosts();
}

async function openPost(id){
  await api(`posts?id=eq.${id}`,{method:'PATCH',prefer:'return=minimal',body:{view_count:null},headers:{'Prefer':'return=minimal'}});
  const posts = await api(`posts?id=eq.${id}&select=*`);
  if(!posts.length) return;
  currentPost = posts[0];
  await api(`posts?id=eq.${id}`,{method:'PATCH',prefer:'return=minimal',body:{view_count:currentPost.view_count+1},headers:{'Prefer':'return=minimal'}});
  currentPost.view_count++;

  document.getElementById('pvTitle').textContent=(currentPost.tag?`[${currentPost.tag}] `:'')+currentPost.title;
  document.getElementById('pvAuthor').textContent=currentPost.author;
  document.getElementById('pvDate').textContent=fmtDate(currentPost.created_at);
  document.getElementById('pvView').textContent=currentPost.view_count;
  document.getElementById('pvBody').textContent=currentPost.body;
  document.getElementById('upCnt').textContent=currentPost.up_count;
  document.getElementById('downCnt').textContent=currentPost.down_count;

  await loadComments();

  document.getElementById('boardListWrap').classList.add('hidden');
  document.getElementById('pvWrap').classList.add('show');
  document.getElementById('tabBar').style.display='none';
  window.scrollTo(0,0);
}

async function loadComments(){
  const cmts = await api(`comments?post_id=eq.${currentPost.id}&select=*&order=created_at.asc`);
  document.getElementById('cmtCount').textContent=cmts.length;
  document.getElementById('commentList').innerHTML = cmts.length
    ? cmts.map(c=>`<div class="cmt-item">
        <div class="cmt-meta"><span class="cmt-nick-tag">${escHtml(c.nick)}</span><span>${fmtDate(c.created_at)}</span></div>
        <div class="cmt-text">${escHtml(c.body)}</div>
      </div>`).join('')
    : '<div class="empty">첫 댓글을 달아보세요!</div>';
}

function goBack(){
  document.getElementById('boardListWrap').classList.remove('hidden');
  document.getElementById('pvWrap').classList.remove('show');
  document.getElementById('tabBar').style.display='';
  currentPost=null;
  loadPosts();
}

async function react(type){
  if(!currentPost) return;
  const field = type==='up'?'up_count':'down_count';
  const newVal = currentPost[field]+1;
  await api(`posts?id=eq.${currentPost.id}`,{method:'PATCH',body:{[field]:newVal},headers:{'Prefer':'return=minimal'}});
  currentPost[field]=newVal;
  document.getElementById(type==='up'?'upCnt':'downCnt').textContent=newVal;
}

async function submitComment(){
  const text=document.getElementById('cmtText').value.trim();
  if(!text){alert('댓글 내용을 입력해주세요');return;}
  const nick=document.getElementById('cmtNick').value.trim()||randAnon();
  document.getElementById('cmtBtn').disabled=true;
  await api('comments',{method:'POST',body:{post_id:currentPost.id,nick,body:text},headers:{'Prefer':'return=minimal'}});
  document.getElementById('cmtText').value='';
  document.getElementById('cmtNick').value='';
  document.getElementById('cmtPw').value='';
  document.getElementById('cmtBtn').disabled=false;
  await loadComments();
}

function openWrite(){document.getElementById('writeModal').classList.add('show');}
function closeWrite(){document.getElementById('writeModal').classList.remove('show');}

async function submitPost(){
  const title=document.getElementById('wTitle').value.trim();
  const body=document.getElementById('wBody').value.trim();
  if(!title){alert('제목을 입력해주세요');return;}
  if(!body){alert('내용을 입력해주세요');return;}
  const nick=document.getElementById('wNick').value.trim()||randAnon();
  const tag=document.getElementById('wTag').value;
  const isNotice=tag==='공지';
  document.getElementById('submitBtn').disabled=true;
  document.getElementById('submitBtn').textContent='등록 중...';
  await api('posts',{method:'POST',body:{tag:isNotice?'':tag,title,author:nick,body,is_notice:isNotice},headers:{'Prefer':'return=minimal'}});
  closeWrite();
  ['wTitle','wBody','wNick','wPw'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('wTag').selectedIndex=0;
  document.getElementById('submitBtn').disabled=false;
  document.getElementById('submitBtn').textContent='등록';
  currentPage=1;
  loadPosts();
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadPosts();
</script>
</body>
</html>
